<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>LEAPer</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <!-- head内 -->
<link rel="manifest" href="manifest.json">
</head>
<body>

    <!-- 🔐 ログイン画面 -->
    <div id="login">
      <h2>LOGIN</h2>
      <input type="password" id="pw" placeholder="パスワード">
      <button onclick="login()">入室</button>
    </div>
  
    <!-- 📘 単語アプリ本体 -->
    <div id="app" style="display:none;">
      <div id="home" class="screen">
  <img id="logoImg" src="images/logo.png" alt="LEAP WORD ロゴ">

  <label class="toggle">
    <input type="checkbox" id="randomToggle">
    ランダム出題
  </label>

  <button id="themeToggle" class="icon-toggle" aria-label="テーマ切り替え">
    🌙
  </button>
  <select id="animMode" class="anim-mode" aria-label="アニメ演出モード">
    <option value="simple">シンプル</option>
    <option value="neon">ネオン</option>
    <option value="pop">ポップ</option>
  </select>

  <div id="unitList" class="unit-list">
  <button id="random10Btn" class="unit-btn special">
      10問
  </button>
    
    
  </div>
</div>
<div id="quiz" class="screen hidden">
  <p id="progress"></p>

  <div class="card">
    <p id="sentence"></p>
    <p id="jp"></p>

    <div class="answer-area">
        <input id="answerInput" />
        <button id="judgeBtn">判定</button>
        <div id="result"></div>
        <div id="matchRate" class="hidden match-rate"></div>
        <div id="meaning" class="hidden"></div>
      </div>

    <!-- 単語アニメ用レイヤー（DOM追加のみ、既存UIは維持） -->
    <div id="wordStage" class="word-stage hidden" aria-hidden="true">
      <div id="wordSilhouette" class="word-silhouette"></div>
      <div id="wordRipple" class="word-ripple"></div>
      <span id="wordFalling" class="word-falling"></span>
      <div id="wordBreakLayer" class="word-break-layer"></div>
    </div>
      
    <div class="controls">
        <button id="homeBtn" class="home-btn" aria-label="ホームへ戻る">🏠</button>
        <button id="speakBtn" class="btn-speak hidden">🔊</button>
        <button id="nextBtn" class="btn-next hidden">▶</button>
    </div>
      
  </div>
</div>

<div id="resultScreen" class="screen hidden">
  <h2>Unit 終了</h2>

  <div class="result-actions">
    <button id="backHome" class="secondary">ホームへ戻る</button>
    <button id="reviewBtn" class="primary hidden">間違えた単語を復習</button>
  </div>
</div>
    </div>
  <script src="script.js"></script>
  
<!-- bodyの最後 -->
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/service-worker.js')
      .then(reg => console.log('Service Worker registered.', reg))
      .catch(err => console.log('Service Worker registration failed:', err));
  }
</script>

</body>
</html>
